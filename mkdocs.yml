site_name: pyduck-ona-profile
site_description: Subject-centric, time-aware people analytics on top of pyduck-ona
site_url: https://ezraair555.github.io/pyduck-ona-profile/
repo_url: https://github.com/ezraair555/pyduck-ona-profile
repo_name: ezraair555/pyduck-ona-profile

theme:
  name: material

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - API reference:
      - Overview: api/index.md
      - schema: api/schema.md
      - subject: api/subject.md
      - timeline: api/timeline.md
      - events: api/events.md
      - query.matcher: api/query.matcher.md
      - query.patterns: api/query.patterns.md
      - query.ask: api/query.ask.md
  - Changelog: changelog.md
